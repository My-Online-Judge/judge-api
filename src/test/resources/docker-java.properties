# MANDATORY on this host — do not remove, and DOCKER_API_VERSION env var does NOT substitute.
#
# When no api version is configured, Testcontainers' docker-java client
# (DockerClientProviderStrategy.getClientForConfig) hard-pins RemoteApiVersion.VERSION_1_32.
# This host runs Docker Engine 29.x, whose daemon rejects API requests below 1.40, so without
# this file Testcontainers fails to start with "Could not find a valid Docker environment."
# Setting the DOCKER_API_VERSION environment variable does not fix this — only this
# classpath properties file (read directly by docker-java) does.
api.version=1.43
