# Read by docker-java (shaded inside Testcontainers) from the test classpath.
#
# Docker Engine 29+ rejects Docker API versions < 1.40, but Testcontainers pins
# API 1.32 whenever no explicit version is configured
# (DockerClientProviderStrategy.getClientForConfig), which makes every strategy
# fail with "client version 1.32 is too old" and silently SKIPS the
# Testcontainers-based tests. An explicit api.version bypasses that pin.
# 1.43 = Docker Engine 24.0+ (mid-2023), comfortably within [1.40, current].
api.version=1.43
