server:
  port: 8080

spring:
  application:
    name: backend-service
  # Serialize any Instant/Date/Calendar JSON in Vietnam time (GMT+7). LocalDateTime fields are naive
  # and unaffected by this — those are pinned via TimeZone.setDefault in BackendServiceApplication.main.
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  profiles:
    active: @spring.profiles.active@
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: judge-api-results
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "vn.thanhtuanle.messaging.event"
        spring.json.value.default.type: "vn.thanhtuanle.messaging.event.SubmissionJudgedEvent"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # We use Redis only for pub/sub fan-out, not Spring Data Redis repositories.
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # An already-populated DB (built previously by initdb.sql + ddl-auto) adopts Flyway by being
    # baselined at V1 (its schema is assumed to match) and then only V2+ run. A fresh empty DB runs
    # every migration from V1. Reference-data inserts in V2 are idempotent, so both paths are safe.
    baseline-on-migrate: true
    baseline-version: 1

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO
  pattern:
    correlation: "[%X{submissionId:-}] "

judge:
  server:
    token: default_token
  # Reconcile job: a submission left in PENDING/JUDGING longer than this is flipped to SYSTEM_ERROR.
  stuck-timeout-min: ${JUDGE_STUCK_TIMEOUT_MIN:5}
  reconcile-interval-ms: ${JUDGE_RECONCILE_INTERVAL_MS:60000}

oj:
  submission:
    cooldown-seconds: ${SUBMISSION_COOLDOWN_SECONDS:10}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:test-cases}
  bundle-retention: ${MINIO_BUNDLE_RETENTION:3}