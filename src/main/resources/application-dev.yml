spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
        provider:
          google:
            authorization-uri: ${GOOGLE_AUTH_URI}
            token-uri: ${GOOGLE_TOKEN_URI}
            user-info-uri: ${GOOGLE_USER_INFO_URI}

server:
  port: 8000

judge:
  server:
    token: ${JUDGE_SERVER_TOKEN}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
openapi:
  service:
    api-docs: oj-api-service
    server: http://localhost:${server.port}
    title: OJ API service
    version: 1.0.0

logging:
  level:
    vn.thanhtuanle: DEBUG
  file:
    name: log/app.log

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
      refresh-token:
        expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}

app:
  # Where the browser is sent back to after Google redirects to this API.
  # Change this (not the Google Console) when the SPA moves port/host.
  base-url: ${APP_BASE_URL:http://localhost:5173}
  cookie:
    # true behind HTTPS so the auth cookies carry Secure.
    secure: ${COOKIE_SECURE:false}
